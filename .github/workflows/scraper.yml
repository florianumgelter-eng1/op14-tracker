name: Preise aktualisieren

on:
  schedule:
    - cron: '0 8 * * *'   # täglich um 08:00 UTC (09:00 MEZ)
  workflow_dispatch:        # manuell auslösbar über GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Scraper ausführen
        run: python scraper.py

      - name: Preisdaten committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices_all.json
          git diff --staged --quiet || git commit -m "Preise aktualisiert: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
