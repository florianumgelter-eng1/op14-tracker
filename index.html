<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Piece TCG Preistracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg:       #0b0d12;
      --surface:  #13181f;
      --surface2: #1a2030;
      --surface3: #212840;
      --border:   #252d3d;
      --border2:  #2e3a50;
      --accent:   #e8b84b;
      --accent-dim: rgba(232,184,75,.12);
      --blue:     #5b9cf6;
      --green:    #3dd68c;
      --red:      #f06060;
      --purple:   #a78bfa;
      --text:     #e2e8f0;
      --text2:    #94a3b8;
      --text3:    #5a6a82;
      --radius:   10px;
      --sidebar:  260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; }

    /* ══ SCROLLBAR ══ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ══ HEADER ══ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .logo {
      width: 32px; height: 32px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent) 0%, #c8960a 100%);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .header-title { font-size: .95rem; font-weight: 700; letter-spacing: -.01em; }
    .header-sub { font-size: .72rem; color: var(--text3); margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(61,214,140,.4)} 50%{opacity:.6;box-shadow:0 0 0 4px rgba(61,214,140,0)} }
    #lastUpdate { font-size: .72rem; color: var(--text3); }
    .icon-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
      width: 30px; height: 30px; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: .9rem; transition: all .15s;
    }
    .icon-btn:hover { background: var(--surface3); border-color: var(--border2); color: var(--text); }

    /* ══ LAYOUT ══ */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ══ SIDEBAR ══ */
    aside {
      width: var(--sidebar); background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-top {
      padding: 10px 12px 6px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); font-weight: 600; }
    .set-list { overflow-y: auto; flex: 1; }

    .set-item {
      display: flex; align-items: center; gap: 0;
      padding: 0; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .12s;
      position: relative;
    }
    .set-item:hover { background: var(--surface2); }
    .set-item.active { background: var(--accent-dim); border-left-color: var(--accent); }
    .set-item.unavailable { opacity: .35; pointer-events: none; }

    .set-num {
      width: 44px; flex-shrink: 0; text-align: center;
      font-size: .65rem; font-weight: 700; font-family: 'Consolas', monospace;
      color: var(--text3); padding: 11px 0;
    }
    .set-item.active .set-num { color: var(--accent); }

    .set-info { flex: 1; padding: 9px 4px 9px 0; min-width: 0; }
    .set-sname { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); }
    .set-item.active .set-sname { color: var(--text); }
    .set-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .set-price-small { font-size: .72rem; font-weight: 700; color: var(--accent); }
    .trend-tag { font-size: .6rem; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
    .trend-tag.up { background: rgba(61,214,140,.15); color: var(--green); }
    .trend-tag.dn { background: rgba(240,96,96,.15); color: var(--red); }

    .sidebar-footer { padding: 8px 10px; border-top: 1px solid var(--border); }
    .compare-btn {
      width: 100%; background: transparent; border: 1px solid var(--border);
      color: var(--text3); padding: 7px 10px; border-radius: 7px; font-size: .75rem;
      cursor: pointer; transition: all .15s; font-family: inherit; text-align: left; display: flex; align-items: center; gap: 7px;
    }
    .compare-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border2); }
    .compare-btn.active { background: rgba(91,156,246,.1); border-color: var(--blue); color: var(--blue); }

    /* ══ MAIN ══ */
    main { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ══ PAGE TITLE ══ */
    .page-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
    .page-title h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
    .page-title .pc-link { font-size: .72rem; color: var(--text3); text-decoration: none; transition: color .15s; }
    .page-title .pc-link:hover { color: var(--blue); }

    /* ══ TABS ══ */
    .tabs { display: flex; gap: 2px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: none; border: none; color: var(--text3); padding: 8px 16px;
      font-size: .82rem; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: 6px;
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-count { background: var(--surface2); border: 1px solid var(--border); color: var(--text3); font-size: .6rem; padding: 1px 5px; border-radius: 10px; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ══ STAT ROW ══ */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr) 1.4fr; gap: 10px; margin-bottom: 16px; }
    .stat-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; position: relative; overflow: hidden;
    }
    .stat-box::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
    .stat-box.s-cur::after { background: var(--accent); }
    .stat-box.s-min::after { background: var(--green); }
    .stat-box.s-max::after { background: var(--red); }
    .stat-box.s-avg::after { background: var(--blue); }
    .stat-box.s-chg::after { background: var(--purple); }
    .s-label { font-size: .62rem; text-transform: uppercase; letter-spacing: .09em; color: var(--text3); font-weight: 600; margin-bottom: 7px; }
    .s-val { font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em; line-height: 1; }
    .stat-box.s-cur .s-val { color: var(--accent); }
    .stat-box.s-min .s-val { color: var(--green); }
    .stat-box.s-max .s-val { color: var(--red); }
    .stat-box.s-avg .s-val { color: var(--blue); }
    .s-sub { font-size: .68rem; color: var(--text3); margin-top: 4px; }
    .chg-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: .8rem; font-weight: 700; margin-top: 2px; }
    .chg-pill.up { background: rgba(61,214,140,.12); color: var(--green); }
    .chg-pill.dn { background: rgba(240,96,96,.12); color: var(--red); }

    /* ══ CHART ══ */
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; }
    .chart-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .chart-lbl { font-size: .8rem; font-weight: 600; color: var(--text2); }
    .range-row { display: flex; gap: 4px; }
    .rng { background: transparent; border: 1px solid var(--border); color: var(--text3); padding: 3px 11px; border-radius: 5px; font-size: .71rem; cursor: pointer; transition: all .12s; font-family: inherit; }
    .rng:hover { border-color: var(--border2); color: var(--text2); }
    .rng.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .chart-wrap { position: relative; height: 300px; }

    /* ══ BOTTOM GRID ══ */
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 800px) { .bottom-grid { grid-template-columns: 1fr; } .stat-row { grid-template-columns: repeat(2,1fr); } }

    /* ══ TABLE CARD ══ */
    .tbl-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .tbl-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tbl-title { font-size: .82rem; font-weight: 600; }
    .tbl-badge { font-size: .65rem; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; }
    .ext-link { font-size: .7rem; color: var(--blue); text-decoration: none; border: 1px solid rgba(91,156,246,.3); padding: 3px 9px; border-radius: 5px; white-space: nowrap; transition: all .15s; }
    .ext-link:hover { background: rgba(91,156,246,.1); }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 7px 16px; text-align: left; font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); background: var(--surface2); font-weight: 600; border-bottom: 1px solid var(--border); }
    tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 8px 16px; font-size: .8rem; }
    td.price { font-weight: 700; color: var(--accent); font-size: .85rem; }
    td.rank { color: var(--text3); font-size: .7rem; width: 32px; text-align: right; padding-right: 6px; font-family: monospace; }
    td.card-num { font-family: 'Consolas', monospace; font-size: .7rem; color: var(--text3); }
    td.card-name a { color: var(--text2); text-decoration: none; transition: color .12s; }
    td.card-name a:hover { color: var(--accent); }

    /* ══ CARD SEARCH ══ */
    .search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .card-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 11px; border-radius: 6px; font-size: .8rem; outline: none; font-family: inherit; transition: border-color .15s; }
    .card-search:focus { border-color: var(--accent); }
    .card-search::placeholder { color: var(--text3); }

    /* ══ COMPARE GRID ══ */
    .cmp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; }
    .cmp-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; cursor: pointer; transition: all .15s;
    }
    .cmp-card:hover { border-color: var(--border2); background: var(--surface2); transform: translateY(-1px); }
    .cmp-card.unavailable { opacity: .3; pointer-events: none; }
    .cmp-op { font-size: .62rem; font-weight: 700; color: var(--text3); font-family: monospace; margin-bottom: 5px; letter-spacing: .05em; }
    .cmp-name { font-size: .78rem; font-weight: 600; line-height: 1.35; margin-bottom: 10px; color: var(--text); }
    .cmp-price { font-size: 1.3rem; font-weight: 800; color: var(--accent); letter-spacing: -.02em; }
    .cmp-trend { margin-top: 4px; }
    .cmp-canvas { height: 44px; margin-top: 10px; display: block; }

    /* ══ LOADING ══ */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 320px; gap: 14px; color: var(--text3); }
    .spinner { width: 32px; height: 32px; border: 2.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading h3 { font-size: .95rem; color: var(--text2); }
    .loading p { font-size: .78rem; line-height: 1.6; text-align: center; }
    .pbar { width: 220px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .pfill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
    .no-data { padding: 40px 20px; text-align: center; color: var(--text3); font-size: .82rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">🃏</div>
  <div>
    <div class="header-title">One Piece TCG Preistracker</div>
    <div class="header-sub">OP-01 bis OP-15 · Booster Box</div>
  </div>
  <div class="header-right">
    <div class="pulse-dot"></div>
    <span id="lastUpdate">Laden...</span>
    <button class="icon-btn" onclick="refreshData()" title="Aktualisieren">⟳</button>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-top">
      <span class="sidebar-label">Sets</span>
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-footer">
      <button class="compare-btn" id="compareBtn" onclick="toggleCompare()">
        <span>⊞</span> Alle Sets vergleichen
      </button>
    </div>
  </aside>

  <main id="main">
    <div class="loading">
      <div class="spinner"></div>
      <h3>Daten werden geladen</h3>
      <p>Preise werden abgerufen…</p>
      <div class="pbar"><div class="pfill" id="progressFill" style="width:0%"></div></div>
    </div>
  </main>
</div>

<script>
  const fmt   = c => '$' + (c / 100).toFixed(2);
  const fmtD  = ts => new Date(ts).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
  const SET_IDS = ['op01','op02','op03','op04','op05','op06','op07','op08','op09','op10','op11','op12','op13','op14','op15'];

  let allSets = {}, activeSet = 'op14', compareMode = false, mainChart = null;

  /* ── helpers ── */
  function getPoints(sd) {
    if (!sd) return [];
    const seen = new Set();
    return [...(sd.history||[]), ...(sd.snapshots||[])]
      .filter(p => { if (seen.has(p[0])) return false; seen.add(p[0]); return true; })
      .sort((a,b) => a[0]-b[0]);
  }

  function calcStats(pts) {
    if (!pts.length) return null;
    const v = pts.map(p=>p[1]);
    const min=Math.min(...v), max=Math.max(...v), avg=Math.round(v.reduce((a,b)=>a+b,0)/v.length);
    const latest=v[v.length-1], first=v[0], change=latest-first;
    return { min, max, avg, latest, first, change, pct: ((change/first)*100).toFixed(1) };
  }

  /* ── SIDEBAR ── */
  function buildSidebar(data) {
    const list = document.getElementById('setList');
    list.innerHTML = '';
    SET_IDS.forEach(id => {
      const sd = data.sets?.[id];
      const available = sd?.available !== false;
      const pts = getPoints(sd);
      const st = calcStats(pts);
      const name = sd?.name?.replace(/OP-\d+\s*/,'') ?? id.toUpperCase();
      const num = id.replace('op','OP-').replace('OP-0','OP-').replace(/OP-(\d)$/,'OP-0$1');

      const div = document.createElement('div');
      div.className = 'set-item' + (id===activeSet?' active':'') + (!available?' unavailable':'');
      div.dataset.id = id;
      div.innerHTML = `
        <div class="set-num">${id.replace('op','').replace(/^0/,'').padStart(2,'0')}</div>
        <div class="set-info">
          <div class="set-sname">${name}</div>
          <div class="set-meta">
            ${st ? `<span class="set-price-small">${fmt(st.latest)}</span>
                    <span class="trend-tag ${st.change>=0?'up':'dn'}">${st.change>=0?'▲':'▼'}${Math.abs(st.pct)}%</span>`
                 : '<span style="font-size:.68rem;color:var(--text3)">–</span>'}
          </div>
        </div>`;
      if (available) div.onclick = () => selectSet(id);
      list.appendChild(div);
    });
  }

  function selectSet(id) {
    if (compareMode) { compareMode = false; document.getElementById('compareBtn').classList.remove('active'); }
    activeSet = id;
    document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===id));
    renderDetail(id);
  }

  /* ── DETAIL VIEW ── */
  function renderDetail(id) {
    const sd = allSets[id];
    const pts = getPoints(sd);
    const st = calcStats(pts);
    const main = document.getElementById('main');

    if (!pts.length) {
      main.innerHTML = `<div class="loading"><h3>Keine Daten für ${id.toUpperCase()}</h3><p>Noch nicht auf PriceCharting verfügbar.</p></div>`;
      return;
    }

    const up = st.change >= 0;
    const cards = sd.cards || [];
    const sales = sd.recent_sales || [];
    const q = encodeURIComponent(sd.ebay_query || sd.name + ' Booster Box sealed');
    const ebayUrl = `https://www.ebay.com/sch/i.html?_nkw=${q}&LH_Sold=1&LH_Complete=1&LH_ItemCondition=1000&_sop=13`;

    main.innerHTML = `
      <div class="page-title">
        <h2>${sd.name}</h2>
        <a class="pc-link" href="${sd.url}" target="_blank">↗ PriceCharting</a>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ov',this)">Übersicht</button>
        <button class="tab-btn" onclick="switchTab('cards',this)">
          Einzelkarten <span class="tab-count">${cards.length}</span>
        </button>
      </div>

      <!-- TAB: Übersicht -->
      <div id="tab-ov" class="tab-panel active">

        <div class="stat-row">
          <div class="stat-box s-cur">
            <div class="s-label">Aktuell</div>
            <div class="s-val">${fmt(st.latest)}</div>
            <div class="s-sub">Letzter Datenpunkt</div>
          </div>
          <div class="stat-box s-min">
            <div class="s-label">Tiefstkurs</div>
            <div class="s-val">${fmt(st.min)}</div>
            <div class="s-sub">im Zeitraum</div>
          </div>
          <div class="stat-box s-max">
            <div class="s-label">Höchstkurs</div>
            <div class="s-val">${fmt(st.max)}</div>
            <div class="s-sub">im Zeitraum</div>
          </div>
          <div class="stat-box s-avg">
            <div class="s-label">Ø Durchschnitt</div>
            <div class="s-val">${fmt(st.avg)}</div>
            <div class="s-sub">über alle Daten</div>
          </div>
          <div class="stat-box s-chg">
            <div class="s-label">Entwicklung gesamt</div>
            <div class="chg-pill ${up?'up':'dn'}">${up?'▲':'▼'} ${up?'+':''}${fmt(st.change)}</div>
            <div class="s-sub">${up?'+':''}${st.pct}% seit Beginn (${fmt(st.first)})</div>
          </div>
        </div>

        <div class="chart-box">
          <div class="chart-top">
            <span class="chart-lbl">Preisverlauf</span>
            <div class="range-row">
              <button class="rng" onclick="fRange(30,this)">1M</button>
              <button class="rng" onclick="fRange(90,this)">3M</button>
              <button class="rng" onclick="fRange(180,this)">6M</button>
              <button class="rng active" onclick="fRange(0,this)">Alle</button>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="bottom-grid">
          <div class="tbl-box">
            <div class="tbl-head">
              <span class="tbl-title">Preisverlauf</span>
              <span class="tbl-badge">${Math.min(pts.length,50)} Einträge</span>
            </div>
            <table>
              <thead><tr><th>Datum</th><th>Preis</th></tr></thead>
              <tbody>
                ${[...pts].reverse().slice(0,50).map(p=>`<tr><td>${fmtD(p[0])}</td><td class="price">${fmt(p[1])}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>

          <div class="tbl-box">
            <div class="tbl-head">
              <span class="tbl-title">Letzte Verkäufe</span>
              <a class="ext-link" href="${ebayUrl}" target="_blank">↗ eBay</a>
            </div>
            ${sales.length
              ? `<table>
                  <thead><tr><th>Datum</th><th>Preis</th></tr></thead>
                  <tbody>${sales.map(s=>`<tr><td>${s.date}</td><td class="price">$${s.price.toFixed(2)}</td></tr>`).join('')}</tbody>
                </table>`
              : `<div class="no-data">Keine Verkaufsdaten verfügbar</div>`}
          </div>
        </div>
      </div><!-- /tab-ov -->

      <!-- TAB: Karten -->
      <div id="tab-cards" class="tab-panel">
        ${renderCardsTab(sd)}
      </div>
    `;

    window._pts = pts;
    buildChart(pts);
  }

  /* ── CHART ── */
  function buildChart(pts) {
    if (mainChart) mainChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    const g = ctx.createLinearGradient(0,0,0,260);
    g.addColorStop(0,'rgba(232,184,75,.22)');
    g.addColorStop(1,'rgba(232,184,75,0)');
    mainChart = new Chart(ctx, {
      type:'line',
      data:{ labels:pts.map(p=>new Date(p[0])), datasets:[{
        data:pts.map(p=>p[1]/100), borderColor:'#e8b84b', backgroundColor:g,
        borderWidth:2, pointRadius:pts.length<20?4:1.5, pointHoverRadius:6,
        pointBackgroundColor:'#e8b84b', tension:.35, fill:true
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'#1a2030', borderColor:'#252d3d', borderWidth:1,
            titleColor:'#5a6a82', bodyColor:'#e2e8f0', padding:10,
            callbacks:{ title:i=>fmtD(i[0].parsed.x), label:i=>` $${i.parsed.y.toFixed(2)}` }
          }
        },
        scales:{
          x:{ type:'time', time:{unit:'week',displayFormats:{week:'dd.MM.yy'}},
              grid:{color:'rgba(37,45,61,.8)'}, ticks:{color:'#5a6a82',maxTicksLimit:7,font:{size:10}} },
          y:{ grid:{color:'rgba(37,45,61,.8)'},
              ticks:{color:'#5a6a82',font:{size:10},callback:v=>'$'+v.toFixed(0)} }
        }
      }
    });
  }

  function fRange(days, btn) {
    document.querySelectorAll('.rng').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let pts = window._pts;
    if (days>0) { const c=Date.now()-days*86400000; pts=pts.filter(p=>p[0]>=c); }
    if (pts.length<2) pts=window._pts;
    buildChart(pts);
  }

  /* ── CARDS TAB ── */
  function renderCardsTab(sd) {
    const cards = sd.cards || [];
    if (!cards.length) return `<div class="loading"><h3>Keine Kartendaten</h3><p>Werden beim nächsten täglichen Update geladen.</p></div>`;
    const rows = cards.map((c,i)=>`
      <tr class="cr">
        <td class="rank">${i+1}</td>
        <td class="card-name"><a href="${c.url}" target="_blank">${c.name}</a></td>
        <td class="card-num">${c.number}</td>
        <td class="price">$${c.price.toFixed(2)}</td>
      </tr>`).join('');
    return `
      <div class="tbl-box">
        <div class="tbl-head">
          <span class="tbl-title">Einzelkarten nach Wert</span>
          <span class="tbl-badge">${cards.length} Karten</span>
        </div>
        <div class="search-wrap">
          <input class="card-search" type="text" placeholder="Karte suchen…" oninput="filterCards(this.value)">
        </div>
        <table>
          <thead><tr><th>#</th><th>Karte</th><th>Nummer</th><th>Preis</th></tr></thead>
          <tbody id="cardsBody">${rows}</tbody>
        </table>
      </div>`;
  }

  function filterCards(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#cardsBody .cr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  /* ── TABS ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
  }

  /* ── COMPARE ── */
  function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById('compareBtn').classList.toggle('active', compareMode);
    compareMode ? renderCompare() : renderDetail(activeSet);
  }

  function renderCompare() {
    const main = document.getElementById('main');
    const html = SET_IDS.map(id => {
      const sd = allSets[id];
      const pts = getPoints(sd);
      const st = calcStats(pts);
      const ok = sd?.available !== false && pts.length>0;
      const name = sd?.name?.replace(/OP-\d+\s*/,'') ?? id;
      const opNum = 'OP-' + id.replace('op','').replace(/^0/,'').padStart(2,'0');
      const up = st?.change >= 0;
      return `
        <div class="cmp-card${ok?'':' unavailable'}" onclick="${ok?`selectSet('${id}')`:''}" >
          <div class="cmp-op">${opNum}</div>
          <div class="cmp-name">${name}</div>
          ${st ? `
            <div class="cmp-price">${fmt(st.latest)}</div>
            <div class="cmp-trend">
              <span class="chg-pill ${up?'up':'dn'}" style="font-size:.65rem;padding:2px 7px">
                ${up?'▲':'▼'} ${up?'+':''}${st.pct}%
              </span>
            </div>
            <canvas class="cmp-canvas" id="mc_${id}" width="185" height="44"></canvas>
          ` : '<div style="color:var(--text3);font-size:.82rem;margin-top:8px">N/A</div>'}
        </div>`;
    }).join('');

    main.innerHTML = `
      <div class="page-title"><h2>Alle Sets im Vergleich</h2></div>
      <div class="cmp-grid">${html}</div>`;

    SET_IDS.forEach(id => {
      const sd = allSets[id];
      const pts = getPoints(sd);
      if (pts.length < 2) return;
      const canvas = document.getElementById('mc_'+id);
      if (!canvas) return;
      const up = calcStats(pts)?.change >= 0;
      new Chart(canvas.getContext('2d'), {
        type:'line',
        data:{ labels:pts.map(p=>new Date(p[0])), datasets:[{
          data:pts.map(p=>p[1]/100),
          borderColor: up ? '#3dd68c' : '#f06060',
          borderWidth:1.5, pointRadius:0, tension:.4, fill:false
        }]},
        options:{ responsive:false, animation:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}} }
      });
    });
  }

  /* ── DATA LOADING ── */
  const isLocal = ['localhost','127.0.0.1'].includes(location.hostname);

  async function refreshData() {
    document.getElementById('lastUpdate').textContent = 'Laden…';
    if (isLocal) {
      document.getElementById('main').innerHTML = `<div class="loading"><div class="spinner"></div><h3>Scraper läuft</h3><p>Alle 15 Sets werden abgefragt…</p><div class="pbar"><div class="pfill" id="progressFill" style="width:5%"></div></div></div>`;
      let p=5; const iv=setInterval(()=>{ p=Math.min(p+3,88); const e=document.getElementById('progressFill'); if(e) e.style.width=p+'%'; },1800);
      try {
        const r = await fetch('/api/update');
        clearInterval(iv);
        const j = await r.json();
        if (!j.ok) throw new Error(j.error);
        applyData(j.data);
      } catch { clearInterval(iv); await loadJSON(); }
    } else {
      document.getElementById('main').innerHTML = `<div class="loading"><div class="spinner"></div><h3>Daten werden geladen</h3></div>`;
      await loadJSON();
    }
  }

  async function loadJSON() {
    try {
      const r = await fetch('prices_all.json?t='+Date.now());
      if (!r.ok) throw new Error('Datei nicht gefunden');
      applyData(await r.json());
    } catch(e) {
      document.getElementById('main').innerHTML = `<div class="loading"><h3>Fehler beim Laden</h3><p>${e.message}</p></div>`;
    }
  }

  function applyData(data) {
    allSets = data.sets || {};
    if (data.last_updated) {
      const d = new Date(data.last_updated);
      document.getElementById('lastUpdate').textContent = d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }
    buildSidebar(data);
    if (!allSets[activeSet]?.available) {
      activeSet = SET_IDS.find(id => allSets[id]?.available && getPoints(allSets[id]).length>0) ?? 'op14';
    }
    compareMode ? renderCompare() : renderDetail(activeSet);
    document.querySelectorAll('.set-item').forEach(el => el.classList.toggle('active', el.dataset.id===activeSet));
  }

  refreshData();
</script>
</body>
</html>
